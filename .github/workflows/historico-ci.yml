# Atualiza HISTORICO_TRABALHO_MARIA.md na main (commit automatico com anti-loop).
# Em Pull Request: apenas mostra preview no log (sem alterar ficheiros no PR).

name: Historico do trabalho (CI)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  historico-main:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[historico-ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerar entrada no historico
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/update_historico.py --write

      - name: Commit e push (se houver alteracao)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HISTORICO_TRABALHO_MARIA.md
          if git diff --staged --quiet; then
            echo "Nenhuma alteracao no historico."
            exit 0
          fi
          git commit -m "chore(historico): atualizacao automatica do relatorio [historico-ci]"
          git push

  historico-pr-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preview do bloco (sem gravar)
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_REF_NAME: ${{ github.head_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/update_historico.py --dry-run
