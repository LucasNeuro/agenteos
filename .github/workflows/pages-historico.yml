# Publica HISTORICO_TRABALHO_MARIA.md como site estatico (GitHub Pages).
# Repositorio publico: qualquer pessoa com o URL pode ler o relatorio sem clone.
#
# Primeira vez no GitHub: Settings - Pages - Build and deployment - Source: GitHub Actions.

name: Pages - Historico publico

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-historico
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar markdown (apenas build do site)
        run: pip install "markdown>=3.5"

      - name: Gerar _site/index.html
        run: python scripts/build_historico_site.py

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Upload artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
